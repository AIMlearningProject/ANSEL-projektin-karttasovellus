<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DEMO Testikartta</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

<style>
    body, html {
    margin: 0;
    padding: 0;
    height: 100%;
}

.map-container {
    height: 100%;
    margin: 0 auto;
}
#map {
    height: 100%;
    width: 100%;
}
</style>
</head>
<body>

<div class="map-container">
    <div id="map"></div>
</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
// --- INITIALIZE MAP ---
var map = L.map('map').setView([63.8338, 23.1605], 17);

if (/Mobi|Android/i.test(navigator.userAgent)) {
    map.scrollWheelZoom.disable(); // prevent accidental zoom on mobile
}

    
// --- TILE LAYER ---
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
}).addTo(map);

// --- FIX DEFAULT ICON ---
var defaultIcon = L.icon({
    iconUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon.png',
    shadowUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png',
    iconSize: [25, 41],
    iconAnchor: [12, 41],
    popupAnchor: [1, -34],
    shadowSize: [41, 41]
});

// --- WAYPOINTS DATA ---
var waypoints = [
    { lat: 63.833979, lng: 23.160647, link: "demosijainti1.html" },
    { lat: 63.833682, lng: 23.161179, link: "demosijainti2.html" },
    { lat: 63.833450, lng: 23.160304, link: "demosijainti3.html" }
];

// --- ADD HIDDEN MARKERS ---
waypoints.forEach(function(wp) {
    // Start marker invisible (opacity 0.2)
    wp.marker = L.marker([wp.lat, wp.lng], { icon: defaultIcon, opacity: 0.2 }).addTo(map);
    wp.marker.on("click", function() {
        if (wp.discovered) { // only clickable when discovered
            window.top.location.href = wp.link;
        }
    });
});

// --- USER LOCATION MARKER ---
var userMarker = null;

// --- ENABLE GPS TRACKING ---
map.locate({ watch: true, setView: false, enableHighAccuracy: true });

map.on('locationfound', function(e) {
    var userLatLng = e.latlng;

    // Update or create user marker
    if (!userMarker) {
        userMarker = L.marker(userLatLng, { icon: defaultIcon }).addTo(map);
    } else {
        userMarker.setLatLng(userLatLng);
    }

    // Check proximity for each waypoint
    waypoints.forEach(function(wp) {
        var distance = userLatLng.distanceTo([wp.lat, wp.lng]); // in meters
        if (distance <= 50000 && !wp.discovered) { // within 50000 meters
            wp.discovered = true;
            wp.marker.setOpacity(1); // fully visible
            wp.marker.bindTooltip("Avaa painamalla ikonia", { permanent: false });
        }
    });
});

map.on('locationerror', function() {
    alert("GPS sijaintiasi ei löydy.");
});
</script>

</body>
</html>
